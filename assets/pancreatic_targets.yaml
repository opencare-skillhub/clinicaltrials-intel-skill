# 胰腺癌靶点配置（融合增强版）
# 由 scripts/fuse_pdac_targets.py 生成；可手工微调后重跑融合。
# 运行时兼容 lib/targets.py：targets[].id/name/group/aliases/keywords

schema_version: '2.1'
version: 2
disease: Pancreatic Cancer
disease_meta:
  name_zh: 胰腺导管腺癌
  name_en: Pancreatic ductal adenocarcinoma
  abbreviation: PDAC
updated: '2026-07-18'
purpose:
- 临床试验检索关键词来源
- ClinicalTrials.gov、ChiCTR、医院公众号/小程序及论文的靶点词归一化
- 患者分子标志物结构化与自动提取
- 靶点、同义词、药物类别及通路标签标准化
source_note: 融合 pdac_targets_search_v2.yaml + clinicaltrials-search/genes.yaml + 本仓库 runtime 分组。默认 KEYWORDS
  仅展开 default_groups；单一靶点可用 search_terms 增强召回。
knowledge_source: /Users/qinxiaoqiang/Downloads/clinicaltrials推送和订阅/assets/pdac_targets_search_v2.yaml
normalization_rules:
  case_insensitive: true
  strip_punctuation: true
  normalize_hyphen_space: true
  gene_symbol_is_canonical: true
  protein_and_pathway_terms_may_map_to_gene_or_biomarker: true
priority_tiers:
  core: 指南/共识明确建议检测，或具有较成熟的肿瘤泛癌/PDAC治疗路径
  A: 用户定义A组；PDAC临床开发活跃且有较明确试验价值
  B: 用户定义B组；具有明确临床试验匹配价值
  C: 用户定义C组；早期ADC、CAR-T、双抗或其他探索方向
  emerging: 近年临床研究活跃，适合扩大召回；不可视为常规推荐
  exploratory: 早期转化或篮子试验方向，仅用于宽召回和情报监测
  context: 非单一可用药靶点，但对分型、免疫、DDR、预后或试验筛选重要
default_groups:
- core
- A
- B
- C
groups:
  core:
    name: 通用监测
    description: 驱动突变 / 免疫 / DDR 等常监测项
  A:
    name: 指南与热点靶点
    description: 指南推荐 + 临床热点（含 SHP2/TF/MET 等）
  B:
    name: 进阶实体瘤靶点
    description: ADC/CAR-T/融合等进阶靶点
  C:
    name: 补测靶点
    description: 白片足够时可考虑补测
  knowledge:
    name: 知识层扩展
    description: emerging/exploratory 等，默认不进入 KEYWORDS，供匹配与情报扩展
retrieval_profiles:
  default:
    groups:
    - core
    - A
    - B
    - C
    use_fields:
    - keywords
    note: 日常推送/抓取，控制 OR 词数量
  single_target:
    groups:
    - core
    - A
    - B
    - C
    - knowledge
    use_fields:
    - keywords
    - search_terms.exact
    - search_terms.zh
    - search_terms.drug_or_class
    note: 菜单单一靶点 / --target，扩大别名与药物词
  wide_monitor:
    groups:
    - core
    - A
    - B
    - C
    - knowledge
    use_fields:
    - keywords
    - search_terms.trial_query_terms
    note: 宽监测；可能过召回，慎用
